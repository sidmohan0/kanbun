services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - DATABASE_PATH=/data/sidcrm.db
      - SCREENSHOTS_DIR=/data/screenshots
    volumes:
      - ./data:/data
    restart: unless-stopped
